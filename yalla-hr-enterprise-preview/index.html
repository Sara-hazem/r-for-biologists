<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yalla HR System — Enterprise Preview</title>
<style>
:root{--navy:#071a31;--navy2:#102e50;--blue:#2563eb;--bg:#f3f6fb;--card:#fff;--text:#172033;--muted:#64748b;--line:#e2e8f0;--green:#059669;--red:#dc2626;--amber:#d97706;--violet:#7c3aed;--shadow:0 14px 36px rgba(8,27,51,.09)}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select{font:inherit}.hidden{display:none!important}.login-page{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--navy),#234b78)}.login-card{width:min(440px,92vw);background:#fff;padding:34px;border-radius:22px;box-shadow:0 28px 80px rgba(0,0,0,.3)}.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#081b33);display:grid;place-items:center;color:#fff;font-size:22px;font-weight:800}.muted{color:var(--muted);font-size:13px}.login-card h1{font-size:25px;margin:22px 0 6px}.field{margin:14px 0}.field label{display:block;font-weight:700;font-size:13px;margin-bottom:7px}.field input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.btn-primary{background:var(--blue);color:#fff}.btn-dark{background:var(--navy);color:#fff}.btn-light{background:#eef2f7;color:var(--text)}.btn-success{background:#d1fae5;color:#065f46}.btn-danger{background:#fee2e2;color:#991b1b}.app{display:grid;grid-template-columns:275px 1fr;min-height:100vh}.sidebar{background:var(--navy);color:#fff;padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}.sidebar .brand{padding:3px 8px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:13px}.nav{width:100%;background:transparent;color:#dbe7f5;border:0;text-align:right;padding:11px 12px;border-radius:9px;cursor:pointer;margin:2px 0}.nav:hover,.nav.active{background:rgba(255,255,255,.12);color:#fff}.main{min-width:0}.topbar{height:72px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5}.content{padding:24px}.page{display:none}.page.active{display:block}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.head h2{margin:0}.filters{display:flex;gap:8px;flex-wrap:wrap}.filters input,.filters select{padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:var(--shadow)}.kpi span{font-size:13px;color:var(--muted)}.kpi b{display:block;font-size:27px;margin-top:8px}.trend{font-size:11px;margin-top:8px}.up{color:var(--green)}.down{color:var(--red)}.grid2{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:18px}.card h3{margin:0 0 14px}.barrow{display:grid;grid-template-columns:120px 1fr 42px;gap:8px;align-items:center;font-size:13px;margin:11px 0}.bar{height:10px;background:#eef2f7;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa)}.actions-list{display:grid;gap:9px}.action{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:11px;padding:11px 12px}.badge{display:inline-block;padding:5px 8px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af}.green{background:#d1fae5;color:#065f46}.amber{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.violet{background:#ede9fe;color:#5b21b6}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:13px;background:#fff}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:right;font-size:13px;white-space:nowrap}th{background:#f8fafc;color:#475569}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{background:#f8fafc;border:1px solid var(--line);border-radius:11px;padding:13px}.metric b{display:block;font-size:19px;margin-top:6px}.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.col{background:#eef2f7;border-radius:13px;padding:12px}.ticket{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;font-size:13px}.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;padding:12px;border-radius:10px;margin-bottom:15px;font-size:13px}.spark{width:100%;height:88px}.spark polyline{fill:none;stroke:#2563eb;stroke-width:3}.spark .grid{stroke:#e5e7eb;stroke-width:1}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick{border:1px solid var(--line);background:#fff;border-radius:11px;padding:12px;cursor:pointer;text-align:right}.quick:hover{border-color:#93c5fd;background:#f8fbff}@media(max-width:1050px){.app{grid-template-columns:86px 1fr}.sidebar .brand div:last-child,.nav span{display:none}.nav{text-align:center}.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.kanban{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.app{display:block}.sidebar{height:auto;position:static;display:flex;overflow:auto;padding:8px}.sidebar .brand{display:none}.nav{min-width:52px}.content{padding:14px}.topbar{padding:0 14px}.kpis,.metric-grid,.kanban,.quick-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section id="login" class="login-page"><div class="login-card"><div class="brand"><div class="logo">Y</div><div><b>Yalla HR System</b><div class="muted">Enterprise Preview</div></div></div><h1>تسجيل الدخول</h1><div class="muted">نسخة معاينة عامة ببيانات تجريبية فقط</div><div class="field"><label>البريد الإلكتروني</label><input id="email" value="admin@yallaedara.com"></div><div class="field"><label>كلمة المرور</label><input id="password" type="password" value="admin123"></div><button class="btn btn-primary" style="width:100%" onclick="loginNow()">دخول النظام</button><div class="muted" style="margin-top:12px">admin@yallaedara.com / admin123</div></div></section>
<section id="app" class="app hidden"><aside class="sidebar"><div class="brand"><div class="logo">Y</div><div><b>Yalla HR</b><div style="font-size:11px;opacity:.75">Enterprise Preview</div></div></div><button class="nav active" onclick="go('dashboard',this)">▦ <span>لوحة القيادة</span></button><button class="nav" onclick="go('employees',this)">👥 <span>الموظفون</span></button><button class="nav" onclick="go('attendance',this)">◷ <span>الحضور</span></button><button class="nav" onclick="go('leaves',this)">▣ <span>الإجازات والاعتمادات</span></button><button class="nav" onclick="go('performance',this)">★ <span>تقييم الأداء</span></button><button class="nav" onclick="go('training',this)">🎓 <span>التدريب والتطوير</span></button><button class="nav" onclick="go('payroll',this)">▧ <span>المرتبات</span></button><button class="nav" onclick="go('recruitment',this)">◈ <span>التوظيف ATS</span></button><button class="nav" onclick="go('reports',this)">📊 <span>التقارير</span></button></aside><main class="main"><header class="topbar"><div><b id="title">لوحة القيادة التنفيذية</b><div class="muted">منظومة يلا إدارة للموارد البشرية</div></div><button class="btn btn-dark" onclick="logoutNow()">خروج</button></header><div class="content"><section id="dashboard" class="page active"></section><section id="employees" class="page"></section><section id="attendance" class="page"></section><section id="leaves" class="page"></section><section id="performance" class="page"></section><section id="training" class="page"></section><section id="payroll" class="page"></section><section id="recruitment" class="page"></section><section id="reports" class="page"></section></div></main></section>
<script>
const names={dashboard:'لوحة القيادة التنفيذية',employees:'إدارة الموظفين',attendance:'الحضور والانصراف',leaves:'الإجازات والاعتمادات',performance:'تقييم الأداء',training:'التدريب والتطوير',payroll:'المرتبات',recruitment:'التوظيف ATS',reports:'مركز التقارير'};
function loginNow(){if(email.value==='admin@yallaedara.com'&&password.value==='admin123'){login.classList.add('hidden');app.classList.remove('hidden');renderAll()}else alert('بيانات الدخول غير صحيحة')}
function logoutNow(){app.classList.add('hidden');login.classList.remove('hidden')}
function go(id,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));b.classList.add('active');title.textContent=names[id]}
function head(t,s,a=''){return `<div class="head"><div><h2>${t}</h2><div class="muted">${s}</div></div><div class="filters">${a}</div></div>`}
function table(h,r){return `<div class="table-wrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.join('')}</tbody></table></div>`}
function renderAll(){
dashboard.innerHTML=head('لوحة القيادة التنفيذية','صورة موحدة لأداء الموارد البشرية','<select><option>يونيو 2026</option></select><select><option>كل الفروع</option><option>الإسكندرية</option><option>القاهرة</option><option>الزقازيق</option></select><select><option>كل الإدارات</option></select>')+`<div class="kpis"><div class="kpi"><span>إجمالي الموظفين</span><b>248</b><div class="trend up">▲ 4.2% عن الشهر السابق</div></div><div class="kpi"><span>الحضور اليوم</span><b>94.8%</b><div class="trend up">▲ 1.6%</div></div><div class="kpi"><span>تكلفة الرواتب</span><b>3.84M</b><div class="trend down">▲ 2.1% تكلفة</div></div><div class="kpi"><span>معدل دوران العمالة</span><b>2.7%</b><div class="trend up">▼ تحسن 0.4%</div></div><div class="kpi"><span>إجازات معلقة</span><b>17</b><div class="trend down">تحتاج اعتماد اليوم</div></div><div class="kpi"><span>متوسط الأداء</span><b>84%</b><div class="trend up">▲ 3 نقاط</div></div><div class="kpi"><span>ساعات التدريب</span><b>426</b><div class="trend up">81% من الخطة</div></div><div class="kpi"><span>وظائف شاغرة</span><b>9</b><div class="trend down">3 متأخرة</div></div></div><div class="grid2"><div><div class="card"><h3>القوى العاملة حسب الإدارة</h3>${[['المبيعات',62,100],['العمليات',51,82],['خدمة العملاء',43,69],['المالية',28,45],['الموارد البشرية',19,31],['تقنية المعلومات',17,27]].map(x=>`<div class="barrow"><span>${x[0]}</span><div class="bar"><i style="width:${x[2]}%"></i></div><b>${x[1]}</b></div>`).join('')}</div><div class="card"><h3>اتجاه الحضور خلال 6 أشهر</h3><svg class="spark" viewBox="0 0 600 100" preserveAspectRatio="none"><line class="grid" x1="0" y1="25" x2="600" y2="25"/><line class="grid" x1="0" y1="55" x2="600" y2="55"/><line class="grid" x1="0" y1="85" x2="600" y2="85"/><polyline points="0,68 100,54 200,59 300,42 400,49 500,31 600,26"/></svg><div class="metric-grid"><div class="metric">متوسط الحضور<b>93.7%</b></div><div class="metric">متوسط الغياب<b>3.4%</b></div><div class="metric">الساعات الإضافية<b>618 س</b></div></div></div></div><div><div class="card"><h3>الإجراءات المطلوبة اليوم</h3><div class="actions-list"><div class="action"><span>إجازات تنتظر اعتماد المدير</span><b class="badge amber">11</b></div><div class="action"><span>إجازات تنتظر اعتماد HR</span><b class="badge red">6</b></div><div class="action"><span>تقييمات أداء متأخرة</span><b class="badge violet">14</b></div><div class="action"><span>عقود ستنتهي خلال 30 يومًا</span><b class="badge red">8</b></div><div class="action"><span>مستندات ناقصة</span><b class="badge amber">23</b></div><div class="action"><span>دورة مرتبات تحتاج مراجعة</span><b class="badge green">1</b></div></div></div><div class="card"><h3>إجراءات سريعة</h3><div class="quick-grid"><button class="quick">إضافة موظف</button><button class="quick">اعتماد إجازة</button><button class="quick">فتح دورة تقييم</button><button class="quick">إنشاء برنامج تدريبي</button></div></div></div></div>`;
employees.innerHTML=head('إدارة الموظفين','Employee 360 وإدارة دورة حياة الموظف','<input placeholder="بحث بالاسم أو الكود"><select><option>كل الإدارات</option></select><button class="btn btn-primary">+ إضافة موظف</button>')+table(['الكود','الموظف','الفرع','الإدارة','الوظيفة','الحالة','اكتمال الملف'],['<tr><td>YH-001</td><td>أحمد محمود</td><td>الإسكندرية</td><td>المبيعات</td><td>مدير فرع</td><td><span class="badge green">نشط</span></td><td>96%</td></tr>','<tr><td>YH-002</td><td>سارة علي</td><td>القاهرة</td><td>الموارد البشرية</td><td>أخصائي أول</td><td><span class="badge green">نشط</span></td><td>100%</td></tr>','<tr><td>YH-003</td><td>محمد حسن</td><td>الإسكندرية</td><td>العمليات</td><td>مشرف عمليات</td><td><span class="badge amber">تحت الاختبار</span></td><td>82%</td></tr>','<tr><td>YH-004</td><td>منى خالد</td><td>الزقازيق</td><td>المالية</td><td>محاسب</td><td><span class="badge green">نشط</span></td><td>91%</td></tr>']);
attendance.innerHTML=head('الحضور والانصراف','متابعة يومية وربط مباشر بالرواتب','<select><option>اليوم</option><option>هذا الشهر</option></select><button class="btn btn-light">استيراد البصمة</button>')+`<div class="kpis"><div class="kpi"><span>الحضور</span><b>235</b></div><div class="kpi"><span>غياب</span><b>8</b></div><div class="kpi"><span>تأخير</span><b>21</b></div><div class="kpi"><span>إضافي</span><b>39.5 س</b></div></div>`+table(['الموظف','الوردية','الدخول','الخروج','التأخير','الحالة'],['<tr><td>أحمد محمود</td><td>09:00-17:00</td><td>08:56</td><td>17:22</td><td>0</td><td><span class="badge green">حاضر</span></td></tr>','<tr><td>سارة علي</td><td>09:00-17:00</td><td>09:14</td><td>17:05</td><td>14 دقيقة</td><td><span class="badge amber">متأخر</span></td></tr>','<tr><td>محمد حسن</td><td>09:00-17:00</td><td>—</td><td>—</td><td>—</td><td><span class="badge red">غائب</span></td></tr>']);
leaves.innerHTML=head('الإجازات والاعتمادات','الموظف ← المدير المباشر ← الموارد البشرية','<button class="btn btn-primary">+ طلب إجازة</button><button class="btn btn-light">التقويم</button>')+`<div class="notice">لا يُخصم الرصيد إلا بعد الاعتماد النهائي من الموارد البشرية.</div>`+table(['رقم الطلب','الموظف','النوع','الفترة','الرصيد','حالة المدير','حالة HR','إجراء'],['<tr><td>LV-1042</td><td>محمد حسن</td><td>سنوية</td><td>18-20 يونيو</td><td>14 يوم</td><td><span class="badge amber">معلق</span></td><td><span class="badge">بانتظار المدير</span></td><td><button class="btn btn-success">اعتماد</button> <button class="btn btn-danger">رفض</button></td></tr>','<tr><td>LV-1041</td><td>منى خالد</td><td>عارضة</td><td>17 يونيو</td><td>5 أيام</td><td><span class="badge green">معتمد</span></td><td><span class="badge amber">قيد المراجعة</span></td><td><button class="btn btn-success">اعتماد نهائي</button></td></tr>']);
performance.innerHTML=head('تقييم الأداء','دورات تقييم، أهداف، KPIs وخطط تحسين الأداء','<select><option>الدورة النصف سنوية 2026</option></select><button class="btn btn-primary">+ دورة تقييم</button>')+`<div class="kpis"><div class="kpi"><span>متوسط الأداء</span><b>84%</b></div><div class="kpi"><span>نسبة الإكمال</span><b>78%</b></div><div class="kpi"><span>تقييمات متأخرة</span><b>14</b></div><div class="kpi"><span>خطط PIP</span><b>6</b></div></div>`+table(['الموظف','الإدارة','تقييم ذاتي','تقييم المدير','النتيجة','التقدير','الحالة'],['<tr><td>أحمد محمود</td><td>المبيعات</td><td>88%</td><td>91%</td><td>90%</td><td><span class="badge green">ممتاز</span></td><td>معتمد</td></tr>','<tr><td>سارة علي</td><td>الموارد البشرية</td><td>84%</td><td>86%</td><td>85%</td><td><span class="badge green">جيد جدًا</span></td><td>مراجعة HR</td></tr>','<tr><td>محمد حسن</td><td>العمليات</td><td>70%</td><td>64%</td><td>66%</td><td><span class="badge amber">يحتاج تحسين</span></td><td>بدء PIP</td></tr>']);
training.innerHTML=head('التدريب والتطوير','الاحتياجات التدريبية وقياس أثر التدريب','<button class="btn btn-primary">+ برنامج تدريبي</button><button class="btn btn-light">الاحتياجات التدريبية</button>')+`<div class="kpis"><div class="kpi"><span>برامج مخططة</span><b>18</b></div><div class="kpi"><span>برامج منفذة</span><b>11</b></div><div class="kpi"><span>الموظفون المدربون</span><b>126</b></div><div class="kpi"><span>تكلفة التدريب</span><b>284K</b></div></div>`+table(['البرنامج','الفئة','التاريخ','الساعات','المشاركون','التحسن','الحالة'],['<tr><td>القيادة للمشرفين</td><td>قيادي</td><td>22 يونيو</td><td>16</td><td>18/20</td><td>+21%</td><td><span class="badge violet">قادم</span></td></tr>','<tr><td>خدمة العملاء المتقدمة</td><td>مهني</td><td>8 يونيو</td><td>12</td><td>24/24</td><td>+18%</td><td><span class="badge green">مكتمل</span></td></tr>']);
payroll.innerHTML=head('المرتبات','إعداد، مراجعة، اعتماد وإقفال دورة المرتب','<select><option>يونيو 2026</option></select><button class="btn btn-primary">تشغيل المرتبات</button>')+`<div class="notice">صلاحيات إعداد المرتب ومراجعته واعتماده منفصلة.</div><div class="kpis"><div class="kpi"><span>إجمالي الاستحقاقات</span><b>4.12M</b></div><div class="kpi"><span>إجمالي الخصومات</span><b>278K</b></div><div class="kpi"><span>صافي الرواتب</span><b>3.84M</b></div><div class="kpi"><span>الحالة</span><b style="font-size:20px">قيد المراجعة</b></div></div>`+table(['الموظف','الأساسي','البدلات','الإضافي','الخصومات','الصافي','الحالة'],['<tr><td>أحمد محمود</td><td>18,000</td><td>4,200</td><td>1,180</td><td>920</td><td><b>22,460</b></td><td><span class="badge amber">مراجعة</span></td></tr>','<tr><td>سارة علي</td><td>15,000</td><td>3,400</td><td>620</td><td>710</td><td><b>18,310</b></td><td><span class="badge amber">مراجعة</span></td></tr>']);
recruitment.innerHTML=head('التوظيف ATS','متابعة المرشحين من الطلب حتى التعيين','<button class="btn btn-primary">+ طلب توظيف</button>')+`<div class="kanban"><div class="col"><b>مرشحون جدد · 12</b><div class="ticket">كريم عادل<br><span class="muted">مسؤول مبيعات</span></div><div class="ticket">هبة حسن<br><span class="muted">محاسب</span></div></div><div class="col"><b>مقابلات · 7</b><div class="ticket">أحمد سمير<br><span class="muted">غدًا 11:00</span></div></div><div class="col"><b>عرض وظيفي · 3</b><div class="ticket">مريم خالد<br><span class="muted">أخصائي HR</span></div></div><div class="col"><b>تم التعيين · 5</b><div class="ticket">نور محمد<br><span class="muted">بدأت العمل</span></div></div></div>`;
reports.innerHTML=head('مركز التقارير','تقارير تفاعلية قابلة للتصفية والتصدير','<button class="btn btn-light">Excel</button><button class="btn btn-light">PDF</button>')+`<div class="metric-grid">${['Headcount','Turnover','Attendance','Leave Balances','Payroll Cost','Performance','Training ROI','Recruitment','Contracts'].map(x=>`<div class="metric">${x}<b>فتح التقرير</b></div>`).join('')}</div>`
}
</script>
</body></html>
