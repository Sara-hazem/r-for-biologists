<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yalla HR System</title><style>:root{--n:#0b1f3a;--b:#2563eb;--bg:#f4f7fb;--c:#fff;--t:#172033;--m:#64748b;--l:#e2e8f0}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:var(--bg);color:var(--t)}button,input,select{font:inherit}.hide{display:none!important}#login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0b1f3a,#244b79)}.login{width:min(420px,92vw);background:#fff;padding:30px;border-radius:20px;box-shadow:0 25px 70px #0005}.logo{width:48px;height:48px;background:linear-gradient(135deg,#2563eb,#0b1f3a);color:#fff;border-radius:14px;display:grid;place-items:center;font-weight:800}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}.field input{width:100%;padding:12px;border:1px solid var(--l);border-radius:10px}.btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700}.primary{background:var(--b);color:#fff}.light{background:#eef2f7}.dark{background:var(--n);color:#fff}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:var(--n);color:#fff;padding:18px 12px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:10px;align-items:center;padding:4px 8px 18px;border-bottom:1px solid #ffffff22;margin-bottom:12px}.nav{width:100%;background:transparent;color:#dbeafe;border:0;padding:11px;border-radius:9px;text-align:right;cursor:pointer;margin:2px 0}.nav:hover,.nav.on{background:#ffffff1c;color:#fff}.main{min-width:0}.top{height:70px;background:#fff;border-bottom:1px solid var(--l);display:flex;justify-content:space-between;align-items:center;padding:0 22px;position:sticky;top:0;z-index:4}.content{padding:22px}.page{display:none}.page.on{display:block}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}.head h2{margin:0}.sub{color:var(--m);font-size:13px;margin-top:4px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.kpi,.card{background:#fff;border:1px solid var(--l);border-radius:14px;padding:16px;box-shadow:0 10px 25px #0b1f3a0b}.kpi span{color:var(--m);font-size:13px}.kpi b{display:block;font-size:26px;margin-top:8px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.barrow{display:grid;grid-template-columns:110px 1fr 35px;gap:8px;align-items:center;margin:11px 0;font-size:13px}.bar{height:9px;background:#edf2f7;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa)}.table{overflow:auto;border:1px solid var(--l);border-radius:12px;background:#fff}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:11px;border-bottom:1px solid var(--l);text-align:right;font-size:13px;white-space:nowrap}th{background:#f8fafc;color:#475569}.badge{padding:5px 8px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af}.green{background:#d1fae5;color:#065f46}.amber{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar input,.toolbar select{padding:9px;border:1px solid var(--l);border-radius:9px;background:#fff}.modal{position:fixed;inset:0;background:#0f172a99;display:grid;place-items:center;padding:18px;z-index:20}.box{background:#fff;width:min(680px,96vw);padding:20px;border-radius:16px;max-height:90vh;overflow:auto}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form input,.form select{width:100%;padding:10px;border:1px solid var(--l);border-radius:9px}.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px}@media(max-width:900px){.app{grid-template-columns:76px 1fr}.brand div:last-child,.nav span{display:none}.nav{text-align:center}.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:600px){.app{display:block}.side{height:auto;position:static;display:flex;overflow:auto}.brand{display:none}.nav{min-width:54px}.content{padding:13px}.kpis{grid-template-columns:1fr}.form{grid-template-columns:1fr}}</style></head><body><section id="login"><div class="login"><div class="brand" style="border:0;color:#172033"><div class="logo">Y</div><div><b>Yalla HR System</b><div class="sub">نسخة عرض عامة ببيانات تجريبية</div></div></div><h2>تسجيل الدخول</h2><div class="field"><label>اسم المستخدم</label><input id="u" value="admin"></div><div class="field"><label>كلمة المرور</label><input id="p" type="password" value="admin123"></div><button class="btn primary" style="width:100%" onclick="enter()">دخول</button><div class="sub" style="margin-top:12px">admin / admin123</div></div></section><section id="app" class="app hide"><aside class="side"><div class="brand"><div class="logo">Y</div><div><b>Yalla HR</b><div style="font-size:11px;opacity:.7">Browser Demo</div></div></div><button class="nav on" onclick="go('dash',this)">▦ <span>لوحة التحكم</span></button><button class="nav" onclick="go('emps',this)">👥 <span>الموظفون</span></button><button class="nav" onclick="go('att',this)">◷ <span>الحضور</span></button><button class="nav" onclick="go('leave',this)">▣ <span>الإجازات</span></button><button class="nav" onclick="go('pay',this)">▧ <span>المرتبات</span></button><button class="nav" onclick="go('quality',this)">✓ <span>جودة البيانات</span></button></aside><main class="main"><header class="top"><div><b id="title">لوحة التحكم التنفيذية</b><div class="sub">منظومة يلا إدارة للموارد البشرية</div></div><button class="btn dark" onclick="out()">خروج</button></header><div class="content"><section id="dash" class="page on"></section><section id="emps" class="page"></section><section id="att" class="page"></section><section id="leave" class="page"></section><section id="pay" class="page"></section><section id="quality" class="page"></section></div></main></section><div id="modal"></div><script>const seed={employees:[['U01','أحمد محمود','الإسكندرية','التسويق','مدير إدارة',18000,'نشط'],['U02','سارة علي','القاهرة','الموارد البشرية','أخصائي موارد بشرية',12000,'نشط'],['U03','محمد حسن','الإسكندرية','المبيعات','مسؤول مبيعات',10500,'نشط'],['U04','منى خالد','الزقازيق','المالية','محاسب',11500,'تحت الاختبار'],['U05','عمر سامي','القاهرة','تقنية المعلومات','دعم فني',13000,'نشط'],['U06','نور أحمد','الإسكندرية','خدمة العملاء','ممثل خدمة عملاء',9500,'نشط']],attendance:[['2026-06-01','U01','09:02','17:15','حاضر',2],['2026-06-01','U02','09:18','17:05','متأخر',18],['2026-06-01','U03','09:00','17:30','حاضر',0],['2026-06-01','U04','—','—','غائب',0],['2026-06-02','U05','08:55','17:10','حاضر',0],['2026-06-02','U06','09:11','17:00','متأخر',11]],leaves:[['LV-001','U02','سنوية','2026-06-10','2026-06-12',3,'معتمد'],['LV-002','U05','عارضة','2026-06-15','2026-06-15',1,'قيد المراجعة']]};let db=JSON.parse(localStorage.getItem('yalla_hr_demo_v2')||'null')||structuredClone(seed);const names={dash:'لوحة التحكم التنفيذية',emps:'قاعدة بيانات الموظفين',att:'الحضور والانصراف',leave:'الإجازات',pay:'المرتبات',quality:'جودة البيانات'};function save(){localStorage.setItem('yalla_hr_demo_v2',JSON.stringify(db))}function enter(){if(u.value==='admin'&&p.value==='admin123'){login.classList.add('hide');app.classList.remove('hide');renderAll()}else alert('بيانات الدخول غير صحيحة')}function out(){app.classList.add('hide');login.classList.remove('hide')}function go(id,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.nav').forEach(x=>x.classList.remove('on'));b.classList.add('on');title.textContent=names[id];render(id)}function renderAll(){Object.keys(names).forEach(render)}function render(id){({dash:dashboard,emps:employees,att:attendance,leave:leaves,pay:payroll,quality:dataQuality})[id]()}function table(h,r){return `<div class="table"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.join('')}</tbody></table></div>`}function employee(code){return db.employees.find(x=>x[0]===code)?.[1]||code}function badge(s){let c=/نشط|حاضر|معتمد/.test(s)?'green':/غائب/.test(s)?'red':/تحت|متأخر|قيد/.test(s)?'amber':'';return `<span class="badge ${c}">${s}</span>`}function dashboard(){let active=db.employees.filter(x=>x[6]==='نشط').length,late=db.attendance.filter(x=>x[4]==='متأخر').reduce((a,x)=>a+x[5],0),abs=db.attendance.filter(x=>x[4]==='غائب').length,total=db.employees.reduce((a,x)=>a+x[5],0);let d={};db.employees.forEach(x=>d[x[3]]=(d[x[3]]||0)+1);let mx=Math.max(...Object.values(d));dash.innerHTML=`<div class="head"><div><h2>لوحة التحكم التنفيذية</h2><div class="sub">مؤشرات تجريبية لعرض وظائف النظام</div></div></div><div class="kpis"><div class="kpi"><span>الموظفون النشطون</span><b>${active}</b></div><div class="kpi"><span>دقائق التأخير</span><b>${late}</b></div><div class="kpi"><span>أيام الغياب</span><b>${abs}</b></div><div class="kpi"><span>إجمالي الرواتب</span><b>${total.toLocaleString('ar-EG')}</b></div></div><div class="grid"><div class="card"><h3>الموظفون حسب الإدارة</h3>${Object.entries(d).map(([k,v])=>`<div class="barrow"><span>${k}</span><div class="bar"><i style="width:${v/mx*100}%"></i></div><b>${v}</b></div>`).join('')}</div><div class="card"><h3>ملخص سريع</h3><p>طلبات الإجازة: <b>${db.leaves.length}</b></p><p>حركات الحضور: <b>${db.attendance.length}</b></p><p>الموظفون تحت الاختبار: <b>${db.employees.filter(x=>x[6].includes('اختبار')).length}</b></p></div></div>`}function employees(){let q=document.getElementById('q')?.value||'';let r=db.employees.filter(x=>x.join(' ').includes(q));emps.innerHTML=`<div class="head"><div><h2>الموظفون</h2><div class="sub">${r.length} سجلات</div></div><div class="toolbar"><input id="q" value="${q}" placeholder="بحث" oninput="employees()"><button class="btn primary" onclick="addEmployee()">+ إضافة موظف</button></div></div>${table(['الكود','الاسم','الفرع','الإدارة','الوظيفة','الراتب','الحالة'],r.map(x=>`<tr><td><b>${x[0]}</b></td><td>${x[1]}</td><td>${x[2]}</td><td>${x[3]}</td><td>${x[4]}</td><td>${x[5].toLocaleString('ar-EG')}</td><td>${badge(x[6])}</td></tr>`))}`}function addEmployee(){modal.innerHTML=`<div class="modal"><div class="box"><h3>إضافة موظف</h3><div class="form"><input id="c" placeholder="الكود"><input id="n" placeholder="الاسم"><input id="br" placeholder="الفرع"><input id="d" placeholder="الإدارة"><input id="j" placeholder="الوظيفة"><input id="s" type="number" placeholder="الراتب"></div><div style="margin-top:14px;display:flex;gap:8px"><button class="btn primary" onclick="saveEmployee()">حفظ</button><button class="btn light" onclick="modal.innerHTML=''">إلغاء</button></div></div></div>`}function saveEmployee(){if(!c.value||!n.value)return alert('أدخل الكود والاسم');db.employees.push([c.value,n.value,br.value,d.value,j.value,Number(s.value||0),'نشط']);save();modal.innerHTML='';employees();dashboard()}function attendance(){att.innerHTML=`<div class="head"><div><h2>الحضور والانصراف</h2><div class="sub">الحركات المسجلة</div></div></div>${table(['التاريخ','الموظف','الحضور','الانصراف','الحالة','التأخير'],db.attendance.map(x=>`<tr><td>${x[0]}</td><td>${employee(x[1])}</td><td>${x[2]}</td><td>${x[3]}</td><td>${badge(x[4])}</td><td>${x[5]} دقيقة</td></tr>`))}`}function leaves(){leave.innerHTML=`<div class="head"><div><h2>الإجازات</h2><div class="sub">طلبات الإجازات</div></div></div>${table(['الطلب','الموظف','النوع','من','إلى','الأيام','الحالة'],db.leaves.map(x=>`<tr><td>${x[0]}</td><td>${employee(x[1])}</td><td>${x[2]}</td><td>${x[3]}</td><td>${x[4]}</td><td>${x[5]}</td><td>${badge(x[6])}</td></tr>`))}`}function payroll(){let rows=db.employees.map(e=>{let delay=db.attendance.filter(x=>x[1]===e[0]).reduce((a,x)=>a+x[5],0),ded=Math.round(delay*e[5]/30/8/60),net=e[5]-ded;return[e[0],e[1],e[5],ded,net]});let total=rows.reduce((a,x)=>a+x[4],0);pay.innerHTML=`<div class="head"><div><h2>المرتبات</h2><div class="sub">صافي الرواتب: ${total.toLocaleString('ar-EG')} ج.م</div></div></div><div class="notice">حساب تجريبي للعرض فقط، وليس كشف رواتب معتمدًا.</div>${table(['الكود','الموظف','الراتب','خصم التأخير','الصافي'],rows.map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${x[2].toLocaleString('ar-EG')}</td><td>${x[3].toLocaleString('ar-EG')}</td><td><b>${x[4].toLocaleString('ar-EG')}</b></td></tr>`))}`}function dataQuality(){let missing=db.employees.filter(x=>x.some(v=>v===''||v==null)).length,dup=db.employees.filter((x,i,a)=>a.findIndex(y=>y[0]===x[0])!==i).length;quality.innerHTML=`<div class="head"><div><h2>جودة البيانات</h2><div class="sub">فحص مبسط للسجلات</div></div></div><div class="kpis"><div class="kpi"><span>أكواد مكررة</span><b>${dup}</b></div><div class="kpi"><span>سجلات ناقصة</span><b>${missing}</b></div><div class="kpi"><span>حركات غير مرتبطة</span><b>0</b></div><div class="kpi"><span>إجمالي الموظفين</span><b>${db.employees.length}</b></div></div><div class="notice">جميع الأسماء والأرقام في هذه النسخة بيانات تجريبية غير حقيقية.</div>`}</script></body></html>
