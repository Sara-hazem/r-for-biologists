<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yalla HR Enterprise Preview v3</title>
<style>
:root{
  --bg:#f2f5fa;--surface:#ffffff;--surface2:#f8fafc;--surface3:#eef3f8;
  --text:#152033;--muted:#667085;--line:#e2e8f0;--navy:#071a31;--navy2:#0f2f54;
  --blue:#2563eb;--blue2:#60a5fa;--green:#059669;--red:#dc2626;--amber:#d97706;--violet:#7c3aed;
  --shadow:0 14px 38px rgba(8,27,51,.08);--soft:0 6px 20px rgba(8,27,51,.06)
}
body.dark{
  --bg:#0b1220;--surface:#111b2d;--surface2:#172338;--surface3:#1b2940;
  --text:#edf4ff;--muted:#9fb0c6;--line:#26364f;--navy:#050b14;--navy2:#0b1727;
  --blue:#4f8df7;--blue2:#7ab0ff;--shadow:0 14px 38px rgba(0,0,0,.25);--soft:0 6px 20px rgba(0,0,0,.2)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);transition:.25s}button,input,select{font:inherit}.hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#071a31,#234d7a)}
.loginbox{width:min(440px,92vw);background:var(--surface);padding:34px;border-radius:22px;box-shadow:0 28px 80px rgba(0,0,0,.32)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#071a31);display:grid;place-items:center;color:#fff;font-size:22px;font-weight:800}
.muted{color:var(--muted);font-size:13px}.field{margin:14px 0}.field label{display:block;font-weight:700;font-size:13px;margin-bottom:7px}.field input,.field select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text)}
.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.primary{background:var(--blue);color:#fff}.darkbtn{background:var(--navy);color:#fff}.light{background:var(--surface3);color:var(--text);border:1px solid var(--line)}.ok{background:#d1fae5;color:#065f46}.bad{background:#fee2e2;color:#991b1b}
.app{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.side{background:var(--navy);color:#fff;padding:18px 12px;position:sticky;top:0;height:100vh;overflow:auto}.side .brand{padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:12px}.group{font-size:11px;color:#8fb0d2;padding:12px 10px 5px}.nav{width:100%;background:transparent;color:#dbe7f5;border:0;text-align:right;padding:10px 12px;border-radius:9px;cursor:pointer;margin:2px 0}.nav:hover,.nav.on{background:rgba(255,255,255,.12);color:#fff}.main{min-width:0}
.top{height:76px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:10;box-shadow:var(--soft)}
.top-actions{display:flex;gap:8px;align-items:center}.theme-toggle{display:flex;gap:8px;align-items:center;background:var(--surface2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}.content{padding:24px}.page{display:none}.page.on{display:block}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.head h2{margin:0}.filters{display:flex;gap:8px;flex-wrap:wrap}.filters input,.filters select{padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--text)}
.hero{background:linear-gradient(135deg,var(--navy2),#1f5ea8);color:#fff;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow);display:grid;grid-template-columns:1.25fr .75fr;gap:18px}.hero h2{margin:0 0 8px}.hero p{margin:0;color:#dce9fa}.hero-score{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.score{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:13px;text-align:center}.score b{display:block;font-size:23px;margin-top:5px}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:22px 0 12px}.section-title h3{margin:0;font-size:17px}.section-title span{font-size:12px;color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.kpi{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden}.kpi:before{content:"";position:absolute;right:0;top:0;width:5px;height:100%;background:var(--blue)}.kpi.greenbar:before{background:var(--green)}.kpi.redbar:before{background:var(--red)}.kpi.amberbar:before{background:var(--amber)}.kpi.violetbar:before{background:var(--violet)}.kpi span{font-size:13px;color:var(--muted)}.kpi b{display:block;font-size:27px;margin-top:8px}.kpi small{display:block;margin-top:8px}.trend-up{color:var(--green)}.trend-down{color:var(--red)}
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:18px}.card h3{margin:0 0 14px}.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.card-head h3{margin:0}.tiny-select{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:8px;padding:7px 9px;font-size:12px}
.table{overflow:auto;border:1px solid var(--line);border-radius:13px;background:var(--surface)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:right;font-size:13px;white-space:nowrap}th{background:var(--surface2);color:var(--muted)}tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:5px 8px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af}.green{background:#d1fae5;color:#065f46}.amber{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.violet{background:#ede9fe;color:#5b21b6}
.barrow{display:grid;grid-template-columns:135px 1fr 48px;gap:8px;align-items:center;font-size:13px;margin:11px 0}.bar{height:10px;background:var(--surface3);border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2))}.bar.greenfill i{background:linear-gradient(90deg,#059669,#34d399)}.bar.amberfill i{background:linear-gradient(90deg,#d97706,#fbbf24)}
.actions{display:grid;gap:9px}.action{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface2)}.metric{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:13px}.metric b{display:block;font-size:18px;margin-top:6px}.metric small{color:var(--muted)}
.donut-wrap{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:center}.donut{width:160px;height:160px;border-radius:50%;background:conic-gradient(#2563eb 0 43%,#059669 43% 72%,#d97706 72% 88%,#7c3aed 88% 100%);position:relative;margin:auto}.donut:after{content:"";position:absolute;inset:28px;border-radius:50%;background:var(--surface)}.legend{display:grid;gap:9px}.legend div{display:flex;justify-content:space-between;gap:12px;font-size:13px}.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:7px}
.spark{width:100%;height:170px}.spark .gridline{stroke:var(--line);stroke-width:1}.spark .line{fill:none;stroke:var(--blue);stroke-width:4}.spark .area{fill:url(#grad);opacity:.25}.spark text{fill:var(--muted);font-size:11px}
.branch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.branch{border:1px solid var(--line);border-radius:13px;padding:14px;background:var(--surface2)}.branch-top{display:flex;justify-content:space-between;align-items:center}.branch b{font-size:18px}.progress{height:8px;border-radius:99px;background:var(--surface3);overflow:hidden;margin-top:10px}.progress i{display:block;height:100%;background:var(--green)}
.decision{border-right:4px solid var(--amber)}.decision.critical{border-right-color:var(--red)}.decision.good{border-right-color:var(--green)}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.col{background:var(--surface3);border-radius:13px;padding:12px}.ticket{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;font-size:13px}.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;padding:12px;border-radius:10px;margin-bottom:15px;font-size:13px}.dark .notice{background:#132642;color:#b9d6ff;border-color:#274a76}.toast{position:fixed;left:22px;bottom:22px;background:#111827;color:#fff;padding:12px 16px;border-radius:10px;display:none;z-index:30}
@media(max-width:1150px){.app{grid-template-columns:88px 1fr}.side .brand div:last-child,.nav span,.group{display:none}.nav{text-align:center}.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid3,.hero{grid-template-columns:1fr}.branch-grid{grid-template-columns:1fr}.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.app{display:block}.side{height:auto;position:static;display:flex;overflow:auto;padding:8px}.side .brand{display:none}.nav{min-width:52px}.content{padding:14px}.top{padding:0 14px}.kpis,.kanban,.hero-score{grid-template-columns:1fr}.donut-wrap{grid-template-columns:1fr}.theme-toggle span{display:none}}
</style>
</head>
<body>
<section id="login" class="login"><div class="loginbox"><div class="brand"><div class="logo">Y</div><div><b>Yalla HR System</b><div class="muted">Enterprise Preview v3</div></div></div><h1 style="margin:22px 0 6px">تسجيل الدخول</h1><div class="muted">نسخة معاينة عامة ببيانات تجريبية ومؤشرات مجمعة لشركة المتحدة</div><div class="field"><label>البريد الإلكتروني</label><input id="email" value="admin@yallaedara.com"></div><div class="field"><label>كلمة المرور</label><input id="password" type="password" value="admin123"></div><button class="btn primary" style="width:100%" onclick="loginNow()">دخول النظام</button><div class="muted" style="margin-top:12px">admin@yallaedara.com / admin123</div></div></section>
<section id="app" class="app hidden"><aside class="side"><div class="brand"><div class="logo">Y</div><div><b>Yalla HR</b><div style="font-size:11px;opacity:.75">Enterprise v3</div></div></div><div class="group">القيادة</div><button class="nav on" onclick="go('dashboard',this)">▦ <span>لوحة القيادة</span></button><button class="nav" onclick="go('org',this)">◫ <span>الهيكل التنظيمي</span></button><div class="group">الخدمة الذاتية</div><button class="nav" onclick="go('ess',this)">◎ <span>بوابة الموظف</span></button><button class="nav" onclick="go('mss',this)">◉ <span>بوابة المدير</span></button><div class="group">العمليات</div><button class="nav" onclick="go('employees',this)">👥 <span>الموظفون</span></button><button class="nav" onclick="go('attendance',this)">◷ <span>الحضور</span></button><button class="nav" onclick="go('leaves',this)">▣ <span>الإجازات</span></button><button class="nav" onclick="go('payroll',this)">▧ <span>المرتبات</span></button><button class="nav" onclick="go('performance',this)">★ <span>الأداء</span></button><button class="nav" onclick="go('training',this)">🎓 <span>التدريب</span></button><button class="nav" onclick="go('recruitment',this)">◈ <span>التوظيف</span></button><button class="nav" onclick="go('documents',this)">📁 <span>المستندات</span></button><button class="nav" onclick="go('assets',this)">▤ <span>العهد والأصول</span></button><button class="nav" onclick="go('reports',this)">📊 <span>التقارير</span></button></aside><main class="main"><header class="top"><div><b id="title">لوحة القيادة التنفيذية</b><div class="muted">شركة المتحدة — منظومة الموارد البشرية</div></div><div class="top-actions"><button class="theme-toggle" onclick="toggleTheme()"><b id="themeIcon">☾</b><span id="themeLabel">الوضع الداكن</span></button><button class="btn light" onclick="showToast('تم تحديث المؤشرات')">تحديث</button><button class="btn darkbtn" onclick="logoutNow()">خروج</button></div></header><div class="content"><section id="dashboard" class="page on"></section><section id="org" class="page"></section><section id="ess" class="page"></section><section id="mss" class="page"></section><section id="employees" class="page"></section><section id="attendance" class="page"></section><section id="leaves" class="page"></section><section id="payroll" class="page"></section><section id="performance" class="page"></section><section id="training" class="page"></section><section id="recruitment" class="page"></section><section id="documents" class="page"></section><section id="assets" class="page"></section><section id="reports" class="page"></section></div></main></section><div id="toast" class="toast"></div>
<script>
const names={dashboard:'لوحة القيادة التنفيذية',org:'الهيكل التنظيمي',ess:'بوابة الموظف',mss:'بوابة المدير',employees:'إدارة الموظفين',attendance:'الحضور والانصراف',leaves:'الإجازات والاعتمادات',payroll:'المرتبات',performance:'تقييم الأداء',training:'التدريب والتطوير',recruitment:'التوظيف ATS',documents:'المستندات والعقود',assets:'العهد والأصول',reports:'مركز التقارير'};
function initTheme(){const saved=localStorage.getItem('yallaTheme');const dark=saved?saved==='dark':window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;document.body.classList.toggle('dark',dark);syncThemeButton()}
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('yallaTheme',document.body.classList.contains('dark')?'dark':'light');syncThemeButton()}
function syncThemeButton(){const d=document.body.classList.contains('dark');themeIcon.textContent=d?'☀':'☾';themeLabel.textContent=d?'الوضع الفاتح':'الوضع الداكن'}
function loginNow(){if(email.value==='admin@yallaedara.com'&&password.value==='admin123'){login.classList.add('hidden');app.classList.remove('hidden');renderAll()}else alert('بيانات الدخول غير صحيحة')}
function logoutNow(){app.classList.add('hidden');login.classList.remove('hidden')}
function go(id,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.nav').forEach(x=>x.classList.remove('on'));b.classList.add('on');title.textContent=names[id]}
function showToast(x){toast.textContent=x;toast.style.display='block';setTimeout(()=>toast.style.display='none',2200)}
function head(t,s,a=''){return `<div class="head"><div><h2>${t}</h2><div class="muted">${s}</div></div><div class="filters">${a}</div></div>`}
function table(h,r){return `<div class="table"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.join('')}</tbody></table></div>`}
function renderDashboard(){dashboard.innerHTML=head('لوحة القيادة التنفيذية','مؤشرات شركة المتحدة — يناير 2026','<select><option>يناير 2026</option><option>ديسمبر 2025</option></select><select><option>كل الفروع</option><option>سموحة 1</option><option>سموحة 2</option><option>الزقازيق</option></select><select><option>كل الإدارات</option></select>')+`<div class="hero"><div><h2>ملخص الإدارة العليا</h2><p>تكلفة الرواتب بعد الزيادة ارتفعت بنسبة 21.1%، بينما توجد 7 وظائف شاغرة و12 إجراءً يحتاج قرارًا خلال 48 ساعة.</p><div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="go('payroll',document.querySelectorAll('.nav')[7])">تحليل الرواتب</button><button class="btn light" onclick="go('org',document.querySelectorAll('.nav')[1])">مراجعة الهيكل</button></div></div><div class="hero-score"><div class="score">صحة القوى العاملة<b>82%</b></div><div class="score">الامتثال التشغيلي<b>91%</b></div><div class="score">جاهزية القرارات<b>76%</b></div></div></div>
<div class="section-title"><h3>المؤشرات الأساسية</h3><span>مقارنة بالشهر السابق</span></div>
<div class="kpis"><div class="kpi"><span>إجمالي الموظفين</span><b>36</b><small class="trend-up">▲ موظفان جديدان</small></div><div class="kpi greenbar"><span>الرواتب الحالية</span><b>296.1K</b><small>متوسط 8,225 جنيه</small></div><div class="kpi amberbar"><span>الرواتب بعد الزيادة</span><b>358.5K</b><small class="trend-down">▲ 62,400 جنيه</small></div><div class="kpi redbar"><span>نسبة الزيادة</span><b>21.1%</b><small class="trend-down">تحتاج مراجعة الميزانية</small></div><div class="kpi violetbar"><span>الإجازات المعلقة</span><b>11</b><small>5 لدى المدير · 6 لدى HR</small></div><div class="kpi greenbar"><span>الحضور اليوم</span><b>94.4%</b><small class="trend-up">▲ 1.2%</small></div><div class="kpi"><span>متوسط الأداء</span><b>83%</b><small class="trend-up">▲ نقطتان</small></div><div class="kpi amberbar"><span>الوظائف الشاغرة</span><b>7</b><small>3 وظائف ذات أولوية</small></div></div>
<div class="grid2"><div><div class="card"><div class="card-head"><h3>اتجاه تكلفة الرواتب</h3><select class="tiny-select"><option>6 أشهر</option><option>12 شهرًا</option></select></div><svg class="spark" viewBox="0 0 700 200" preserveAspectRatio="none"><defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></linearGradient></defs><line class="gridline" x1="0" y1="40" x2="700" y2="40"/><line class="gridline" x1="0" y1="90" x2="700" y2="90"/><line class="gridline" x1="0" y1="140" x2="700" y2="140"/><path class="area" d="M0,150 L115,142 L230,130 L345,120 L460,112 L575,96 L700,45 L700,190 L0,190 Z"/><polyline class="line" points="0,150 115,142 230,130 345,120 460,112 575,96 700,45"/><text x="10" y="188">أغسطس</text><text x="320" y="188">نوفمبر</text><text x="640" y="188">يناير</text></svg><div class="grid3"><div class="metric">الزيادة الشهرية<b>62,400</b><small>جنيه</small></div><div class="metric">متوسط الراتب الجديد<b>9,958</b><small>جنيه</small></div><div class="metric">الفرق السنوي المتوقع<b>748.8K</b><small>جنيه</small></div></div></div>
<div class="card"><div class="card-head"><h3>توزيع القوى العاملة حسب الإدارة</h3><span class="badge">10 إدارات</span></div>${[['مبيعات الفروع',8,100],['المالية والمخازن',6,75],['الصيانة',5,63],['الدعم الفني والمشروعات',4,50],['المشتريات',3,38],['الموارد البشرية',3,38]].map(x=>`<div class="barrow"><span>${x[0]}</span><div class="bar"><i style="width:${x[2]}%"></i></div><b>${x[1]}</b></div>`).join('')}</div></div>
<div><div class="card"><div class="card-head"><h3>القرارات المطلوبة اليوم</h3><span class="badge red">12 إجراء</span></div><div class="actions"><div class="action decision critical"><span>اعتماد زيادة الرواتب</span><b class="badge red">حرج</b></div><div class="action decision"><span>5 إجازات تنتظر المدير</span><b class="badge amber">اليوم</b></div><div class="action decision"><span>6 إجازات تنتظر HR</span><b class="badge amber">24 ساعة</b></div><div class="action decision critical"><span>3 عقود ستنتهي قريبًا</span><b class="badge red">30 يومًا</b></div><div class="action decision good"><span>دورة تقييم جاهزة للإغلاق</span><b class="badge green">92%</b></div></div></div>
